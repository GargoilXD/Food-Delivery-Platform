spring:
  application:
    name: customer-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/customer_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  cloud:
    stream:
      bindings:
        customerEvents-out-0:
          destination: customer.events
          content-type: application/json
        userEvents-in-0:
          destination: user.events
          content-type: application/json
          group: customer-service
      rabbit:
        bindings:
          customerEvents-out-0:
            producer:
              exchange-type: topic
          userEvents-in-0:
            consumer:
              exchange-type: topic

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic

services:
  auth:
    url: http://auth-microservice:8081

resilience4j:
  circuitbreaker:
    instances:
      authService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true

server:
  port: 8082

logging:
  level:
    root: INFO
    com.customer.service: DEBUG
    org.hibernate.SQL: WARN
