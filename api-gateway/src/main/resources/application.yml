spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-microservice:8081/.well-known/jwks.json
  cloud:
    inetutils:
      ignore-interfaces:
        - ".*Virtual.*"
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates: [ Path=/auth/** ]
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates: [ Path=/api/customers/** ]
              filters: [ StripPrefix=1 ]
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates: [ Path=/api/orders/** ]
              filters: [ StripPrefix=1 ]
            - id: delivery-service
              uri: lb://DELIVERY-SERVICE
              predicates: [ Path=/api/deliveries/** ]
              filters: [ StripPrefix=1 ]
            - id: restaurant-service
              uri: lb://RESTAURANT-SERVICE
              predicates: [ "Path=/api/restaurants/**,/api/menu-items/**" ]
              filters: [ StripPrefix=1 ]
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          trusted-proxies: "127\\.0\\.0\\.1|10\\.\\d+\\.\\d+\\.\\d+|192\\.168\\.\\d+\\.\\d+"


eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    fetch-registry: true
    service-url:
      defaultZone: ${DEFAULT_ZONE:http://localhost:8761/eureka/}

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"

server:
  port: 8080

rate-limiter:
  orders:
    limit-for-period: 20
    refresh-period-seconds: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,routes
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.api.gateway: DEBUG
    org.springframework.cloud.gateway: WARN